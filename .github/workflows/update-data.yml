name: 데이터 자동 갱신

on:
  schedule:
    - cron: '0 17 * * *'  # 매일 새벽 2시 KST (UTC 17시)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r scripts/requirements.txt

      - name: 데이터 수집
        run: python scripts/fetch_data.py
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}

      - name: 페이지 생성
        run: python scripts/generate_pages.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: 데이터 자동 갱신 $(date +'%Y-%m-%d')"
          git push
